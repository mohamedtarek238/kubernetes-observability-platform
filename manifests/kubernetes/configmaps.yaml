        - action: replace
          source_labels:
          - __meta_kubernetes_pod_node_name
          target_label: node
        scrape_interval: 5m
        scrape_timeout: 30s
      alerting:
        alertmanagers:
          - static_configs:
            - targets:
              - prometheus-alertmanager.monitoring.svc:9093
