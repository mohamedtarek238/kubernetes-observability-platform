    datasources.yaml: |
      apiVersion: 1
      datasources:
      - access: proxy
        isDefault: true
        name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
      - access: proxy
        name: loki
        type: loki
        url: http://loki-gateway.monitoring.svc.cluster.local
      - access: proxy
        name: Zipkin
        type: zipkin
        url: http://zipkin.monitoring.svc.cluster.local
      - access: proxy
        name: OpenTelemetry
        type: tempo
        url: http://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318
    grafana.ini: |
      [analytics]
      check_for_updates = true
      [grafana_net]
      url = https://grafana.net
      [log]
      mode = console
      [paths]
      data = /var/lib/grafana/
      logs = /var/log/grafana
      plugins = /var/lib/grafana/plugins
      provisioning = /etc/grafana/provisioning
      [securityContext]
      fsGroup = 472
      runAsUser = 472
      [server]
      domain = ''
    plugins: digrich-bubblechart-panel,grafana-clock-panel
