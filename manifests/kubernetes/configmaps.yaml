  data:
    config.yaml: |2

      auth_enabled: false
      bloom_build:
        builder:
          planner_address: loki-backend-headless.monitoring.svc.cluster.local:9095
        enabled: false
      bloom_gateway:
        client:
          addresses: dnssrvnoa+_grpc._tcp.loki-backend-headless.monitoring.svc.cluster.local
        enabled: false
      chunk_store_config:
        chunk_cache_config:
          background:
            writeback_buffer: 500000
            writeback_goroutines: 1
            writeback_size_limit: 500MB
          default_validity: 0s
          memcached:
            batch_size: 4
            parallelism: 5
          memcached_client:
            addresses: dnssrvnoa+_memcached-client._tcp.loki-chunks-cache.monitoring.svc
            consistent_hash: true
            max_idle_conns: 72
            timeout: 2000ms
      common:
        compactor_grpc_address: 'loki-backend.monitoring.svc.cluster.local:9095'
        path_prefix: /var/loki
        replication_factor: 2
        storage:
          s3:
            access_key_id: admin
            bucketnames: loki-data
            endpoint: http://minio2.isfpdomain.com
            insecure: false
            region: us-east-1
            s3forcepathstyle: true
            secret_access_key: admin1234
      frontend:
        scheduler_address: ""
        tail_proxy_url: ""
      frontend_worker:
        scheduler_address: ""
      index_gateway:
        mode: simple
      ingester:
        chunk_idle_period: 3m
        chunk_target_size: 1048576
        max_chunk_age: 1h
      limits_config:
        ingestion_burst_size_mb: 128
        ingestion_rate_mb: 64
        max_cache_freshness_per_query: 10m
        per_stream_rate_limit: 64MB
        query_timeout: 300s
        reject_old_samples: true
        reject_old_samples_max_age: 168h
        split_queries_by_interval: 15m
        volume_enabled: true
      memberlist:
        join_members:
        - loki-memberlist
      pattern_ingester:
        enabled: false
      query_range:
        align_queries_with_step: true
        cache_results: true
        results_cache:
          cache:
            background:
              writeback_buffer: 500000
              writeback_goroutines: 1
              writeback_size_limit: 500MB
            default_validity: 12h
            memcached_client:
              addresses: dnssrvnoa+_memcached-client._tcp.loki-results-cache.monitoring.svc
              consistent_hash: true
              timeout: 500ms
              update_interval: 1m
      ruler:
        storage:
          s3:
            access_key_id: admin
            bucketnames: loki-data
            endpoint: http://minio2.isfpdomain.com
            insecure: false
            region: us-east-1
            s3forcepathstyle: true
            secret_access_key: admin1234
          type: s3
        wal:
          dir: /var/loki/ruler-wal
      runtime_config:
        file: /etc/loki/runtime-config/runtime-config.yaml
      schema_config:
        configs:
        - from: "2024-01-01"
          index:
            period: 24h
            prefix: index_
          object_store: s3
          schema: v13
          store: tsdb
      server:
        grpc_listen_port: 9095
        http_listen_port: 3100
        http_server_read_timeout: 600s
        http_server_write_timeout: 600s
      storage_config:
        bloom_shipper:
          working_directory: /var/loki/data/bloomshipper
        boltdb_shipper:
          index_gateway_client:
            server_address: dns+loki-backend-headless.monitoring.svc.cluster.local:9095
        hedging:
          at: 250ms
          max_per_second: 20
          up_to: 3
        tsdb_shipper:
          index_gateway_client:
            server_address: dns+loki-backend-headless.monitoring.svc.cluster.local:9095
      tracing:
        enabled: false
